name: Update taolk

on:
  repository_dispatch:
    types: [update-taolk]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION#v}"
          python3 -c "
          import re
          with open('Formula/taolk.rb') as f: content = f.read()
          shas = [
              '${{ github.event.client_payload.macos_arm64_sha256 }}',
              '${{ github.event.client_payload.macos_x86_64_sha256 }}',
              '${{ github.event.client_payload.linux_arm64_sha256 }}',
              '${{ github.event.client_payload.linux_x86_64_sha256 }}',
          ]
          i = 0
          def replacer(m):
              nonlocal i
              if i < len(shas):
                  r = f'sha256 \"{shas[i]}\"'
                  i += 1
                  return r
              return m.group(0)
          content = re.sub(r'sha256 \"[^\"]+\"', replacer, content)
          content = re.sub(r'version \"[^\"]+\"', f'version \"${VERSION}\"', content)
          with open('Formula/taolk.rb', 'w') as f: f.write(content)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/taolk.rb
          git commit -m "taolk ${{ github.event.client_payload.version }}"
          git push
